<div class="app-shell">
  <!-- ── Application bar ─────────────────────────────────────────────── -->
  <header class="app-bar">
    <div class="app-bar__brand">
      <svg
        class="app-bar__logo"
        viewBox="0 0 30 20"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <polyline
          points="1,14 5,14 7,3 10,18 13,9 16,15 19,7 22,14 29,14"
          stroke="#2dd4bf"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <line
          x1="1"
          y1="19"
          x2="29"
          y2="19"
          stroke="#2dd4bf"
          stroke-width="1"
          stroke-linecap="round"
          opacity="0.35"
        />
      </svg>
      <div class="app-bar__identity">
        <span class="app-bar__name">Math Explorer</span>
        <span class="app-bar__sub">Analysis Toolset</span>
      </div>
    </div>

    <div class="app-bar__divider" aria-hidden="true"></div>

    <nav class="app-bar__nav" aria-label="Módulos">
      <a routerLink="/funciones" routerLinkActive="is-active">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path
            d="M1 13 C4 13 4 3 7 3 C10 3 10 13 13 13"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <span>Funciones 2D</span>
      </a>
      <a routerLink="/paraboloide" routerLinkActive="is-active">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <ellipse cx="8" cy="8" rx="6" ry="4" stroke="currentColor" stroke-width="1.5" />
          <path
            d="M8 4 V12"
            stroke="currentColor"
            stroke-width="1"
            stroke-dasharray="2 1.5"
            opacity="0.6"
          />
          <path
            d="M2 8 H14"
            stroke="currentColor"
            stroke-width="1"
            stroke-dasharray="2 1.5"
            opacity="0.6"
          />
        </svg>
        <span>Superficies 3D</span>
      </a>
      <a routerLink="/geo-3d" routerLinkActive="is-active">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 1 L14 8 L8 15 L2 8 Z" stroke="currentColor" stroke-width="1.5" />
          <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5" />
        </svg>
        <span>Geo 3D</span>
      </a>
      <a routerLink="/spain-graph" routerLinkActive="is-active">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/>
          <path d="M2 8h12M8 2a10 10 0 0 1 3 6 10 10 0 0 1-3 6 10 10 0 0 1-3-6 10 10 0 0 1 3-6z"
                stroke="currentColor" stroke-width="1" opacity="0.55"/>
        </svg>
        <span>GIS España</span>
      </a>
    </nav>

    <div class="app-bar__end">
      <span class="build-badge">BUILD 2026.1</span>
    </div>
  </header>

  <!-- ── Page content ────────────────────────────────────────────────── -->
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
